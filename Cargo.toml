[package]
name = "netabase_store"
version = "0.1.0"
edition = "2024"

[features]
default = []
libp2p = ["dep:libp2p"]
record-store = ["libp2p"]

[dependencies]
anyhow = "1.0.100"
bincode = { version = "2.0", features = ["derive", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
derive_more = { version = "2.0.1", features = ["from", "try_into", "into"] }
libp2p = { version = "0.56.0", features = ["kad"], optional = true }
netabase_macros = { path = "netabase_macros" }
serde = { version = "1.0", features = ["derive"] }
sled = "0.34.7"
strum = { version = "0.27.2", features = ["derive", "strum_macros"] }
thiserror = "2.0.17"

[dev-dependencies]
tempfile = "3.0"
rand = "0.8"
quickcheck = "1.0"
log = "0.4"
env_logger = "0.10"
